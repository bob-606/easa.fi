<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fly, you fools</title>
    <style>
        :root {
            --color-bg-primary: #0f1419;
            --color-text-primary: #ffffff;
            --color-text-secondary: #a0aec0;
            --color-accent: #e8c547;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--color-bg-primary);
            color: var(--color-text-primary);
            line-height: 1.6;
        }

        main {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .hero {
            text-align: center;
            max-width: 500px;
        }

        .gandalf-img {
            max-width: 240px;
            height: auto;
            opacity: 0.85;
            margin-bottom: 1.5rem;
        }

        .quote {
            font-family: 'Courier New', monospace;
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-accent);
            letter-spacing: 3px;
            margin: 1rem 0 0.5rem;
        }

        .attribution {
            font-size: 0.9rem;
            color: var(--color-text-secondary);
        }

        @media (max-width: 768px) {
            .gandalf-img {
                max-width: 160px;
            }
            .quote {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <main>
        <section class="hero">
            <img class="gandalf-img" src="gandalf.png" alt="Gandalf the Grey">
            <div class="quote">"FLY, YOU FOOLS"</div>
            <div class="attribution">— Gandalf the Grey</div>
        </section>
    </main>
</body>
</html>
