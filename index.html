<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fly, you fools</title>
    <style>
        :root {
            --color-bg-primary: #0f1419;
            --color-text-primary: #ffffff;
            --color-text-secondary: #a0aec0;
            --color-accent: #e8c547;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--color-bg-primary);
            color: var(--color-text-primary);
            line-height: 1.6;
            overflow: hidden;
        }

        main {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .hero {
            text-align: center;
            max-width: 600px;
        }

        .gif-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 2rem;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(232, 197, 71, 0.15);
        }

        .gif-wrapper img {
            display: block;
            max-width: 100%;
            height: auto;
            border-radius: 12px;
        }

        .quote {
            font-family: 'Courier New', monospace;
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-accent);
            margin: 1rem 0 0.5rem;
            min-height: 2.8rem;
            display: inline-block;
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid var(--color-accent);
            animation: typing 1.5s steps(16) forwards, blink 0.8s step-end 3;
        }

        .quote.done {
            border-right-color: transparent;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 16ch; }
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }

        .attribution {
            font-size: 0.9rem;
            color: var(--color-text-secondary);
            opacity: 0;
            animation: fadeIn 1s ease 1.8s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .particle {
            position: fixed;
            bottom: -10px;
            width: 4px;
            height: 4px;
            background: var(--color-accent);
            border-radius: 50%;
            opacity: 0;
            animation: rise linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        .particle:nth-child(1) { left: 10%; width: 3px; height: 3px; animation-duration: 6s; animation-delay: 0s; }
        .particle:nth-child(2) { left: 20%; width: 5px; height: 5px; animation-duration: 8s; animation-delay: 0.5s; }
        .particle:nth-child(3) { left: 30%; width: 2px; height: 2px; animation-duration: 5s; animation-delay: 1s; }
        .particle:nth-child(4) { left: 40%; width: 4px; height: 4px; animation-duration: 7s; animation-delay: 0.3s; }
        .particle:nth-child(5) { left: 50%; width: 3px; height: 3px; animation-duration: 9s; animation-delay: 1.5s; }
        .particle:nth-child(6) { left: 60%; width: 5px; height: 5px; animation-duration: 6.5s; animation-delay: 0.8s; }
        .particle:nth-child(7) { left: 70%; width: 2px; height: 2px; animation-duration: 5.5s; animation-delay: 0.2s; }
        .particle:nth-child(8) { left: 80%; width: 4px; height: 4px; animation-duration: 7.5s; animation-delay: 1.2s; }
        .particle:nth-child(9) { left: 90%; width: 3px; height: 3px; animation-duration: 8.5s; animation-delay: 0.7s; }
        .particle:nth-child(10) { left: 15%; width: 5px; height: 5px; animation-duration: 6s; animation-delay: 0.9s; }
        .particle:nth-child(11) { left: 45%; width: 2px; height: 2px; animation-duration: 7s; animation-delay: 0.4s; }
        .particle:nth-child(12) { left: 55%; width: 3px; height: 3px; animation-duration: 5.5s; animation-delay: 1.8s; }
        .particle:nth-child(13) { left: 75%; width: 4px; height: 4px; animation-duration: 8s; animation-delay: 0.1s; }
        .particle:nth-child(14) { left: 85%; width: 2px; height: 2px; animation-duration: 6.5s; animation-delay: 1.6s; }
        .particle:nth-child(15) { left: 95%; width: 5px; height: 5px; animation-duration: 9s; animation-delay: 0.6s; }

        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100vh) scale(0.3); opacity: 0; }
        }

        @media (max-width: 768px) {
            .gif-wrapper img {
                max-width: 90vw;
            }
            .quote {
                font-size: 1.3rem;
                min-height: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <main>
        <section class="hero">
            <div class="gif-wrapper">
                <img src="gandalf.gif" alt="Gandalf">
            </div>
            <div class="quote">"FLY, YOU FOOLS"</div>
            <div class="attribution">— Gandalf the Grey</div>
        </section>
    </main>
</body>
</html>
