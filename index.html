<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fly, you fools</title>
    <style>
        :root {
            --color-bg-primary: #0f1419;
            --color-text-primary: #ffffff;
            --color-text-secondary: #a0aec0;
            --color-accent: #e8c547;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--color-bg-primary);
            color: var(--color-text-primary);
            line-height: 1.6;
            overflow: hidden;
        }

        main {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            position: relative;
        }

        .hero {
            text-align: center;
            max-width: 500px;
            position: relative;
            z-index: 1;
        }

        .gandalf-img {
            max-width: 240px;
            height: auto;
            opacity: 0.85;
            margin-bottom: 1.5rem;
            cursor: pointer;
            transition: filter 0.4s, opacity 0.4s, transform 0.3s;
            border-radius: 8px;
        }

        .gandalf-img:hover {
            opacity: 1;
            transform: scale(1.02);
        }

        .gandalf-img.glow {
            filter: drop-shadow(0 0 30px rgba(232, 197, 71, 0.6)) drop-shadow(0 0 60px rgba(232, 197, 71, 0.3));
            opacity: 1;
        }

        .quote {
            font-family: 'Courier New', monospace;
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-accent);
            letter-spacing: 3px;
            margin: 1rem 0 0.5rem;
            min-height: 2.8rem;
            display: inline-block;
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid var(--color-accent);
            animation: typing 1.5s steps(16) forwards, blink 0.8s step-end 3;
        }

        .quote.done {
            border-right-color: transparent;
        }

        .quote.shake {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 16ch; }
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }

        .attribution {
            font-size: 0.9rem;
            color: var(--color-text-secondary);
            opacity: 0;
            animation: fadeIn 1s ease 1.8s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .click-hint {
            font-size: 0.75rem;
            color: var(--color-text-secondary);
            margin-bottom: 1rem;
            opacity: 0.4;
            animation: fadeIn 1s ease 2.5s forwards;
        }

        .particle {
            position: fixed;
            bottom: -10px;
            width: 4px;
            height: 4px;
            background: var(--color-accent);
            border-radius: 50%;
            opacity: 0;
            animation: rise linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        .particle:nth-child(1) { left: 10%; width: 3px; height: 3px; animation-duration: 6s; animation-delay: 0s; }
        .particle:nth-child(2) { left: 20%; width: 5px; height: 5px; animation-duration: 8s; animation-delay: 0.5s; }
        .particle:nth-child(3) { left: 30%; width: 2px; height: 2px; animation-duration: 5s; animation-delay: 1s; }
        .particle:nth-child(4) { left: 40%; width: 4px; height: 4px; animation-duration: 7s; animation-delay: 0.3s; }
        .particle:nth-child(5) { left: 50%; width: 3px; height: 3px; animation-duration: 9s; animation-delay: 1.5s; }
        .particle:nth-child(6) { left: 60%; width: 5px; height: 5px; animation-duration: 6.5s; animation-delay: 0.8s; }
        .particle:nth-child(7) { left: 70%; width: 2px; height: 2px; animation-duration: 5.5s; animation-delay: 0.2s; }
        .particle:nth-child(8) { left: 80%; width: 4px; height: 4px; animation-duration: 7.5s; animation-delay: 1.2s; }
        .particle:nth-child(9) { left: 90%; width: 3px; height: 3px; animation-duration: 8.5s; animation-delay: 0.7s; }
        .particle:nth-child(10) { left: 95%; width: 5px; height: 5px; animation-duration: 6s; animation-delay: 0.9s; }
        .particle:nth-child(11) { left: 15%; width: 2px; height: 2px; animation-duration: 7s; animation-delay: 0.4s; }
        .particle:nth-child(12) { left: 45%; width: 3px; height: 3px; animation-duration: 5.5s; animation-delay: 1.8s; }
        .particle:nth-child(13) { left: 55%; width: 4px; height: 4px; animation-duration: 8s; animation-delay: 0.1s; }
        .particle:nth-child(14) { left: 75%; width: 2px; height: 2px; animation-duration: 6.5s; animation-delay: 1.6s; }
        .particle:nth-child(15) { left: 85%; width: 5px; height: 5px; animation-duration: 9s; animation-delay: 0.6s; }

        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100vh) scale(0.3); opacity: 0; }
        }

        @media (max-width: 768px) {
            .gandalf-img {
                max-width: 160px;
            }
            .quote {
                font-size: 1.3rem;
                min-height: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <main>
        <section class="hero">
            <img class="gandalf-img" src="gandalf.png" alt="Gandalf the Grey">
            <div class="click-hint">⚡ click Gandalf's staff</div>
            <div class="quote" id="quote">"FLY, YOU FOOLS"</div>
            <div class="attribution">— Gandalf the Grey</div>
        </section>
    </main>

    <script>
        const img = document.querySelector('.gandalf-img');
        const quote = document.getElementById('quote');

        img.addEventListener('click', function () {
            this.classList.add('glow');
            quote.classList.remove('shake');

            if (quote.textContent.includes('FLY')) {
                quote.textContent = '"YOU SHALL NOT PASS"';
                quote.style.animation = 'none';
                void quote.offsetHeight;
                quote.style.animation = 'shake 0.5s ease-in-out';
                quote.classList.add('done');

                setTimeout(() => {
                    quote.textContent = '"FLY, YOU FOOLS"';
                    quote.style.animation = 'none';
                    void quote.offsetHeight;
                    quote.style.animation = 'shake 0.5s ease-in-out';
                    setTimeout(() => {
                        this.classList.remove('glow');
                    }, 500);
                }, 2000);
            }
        });
    </script>
</body>
</html>
